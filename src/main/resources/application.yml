server:
  port: 2612

spring:
  datasource:
    url: jdbc:postgresql://localhost:5443/maydls
    username: maydls_user
    password: maydls_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: yt

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration