services:
  postgres:
    image: postgres:15
    container_name: maydls-postgres-dev
    environment:
      POSTGRES_DB: maydls
      POSTGRES_USER: maydls_user
      POSTGRES_PASSWORD: maydls_pass
    ports:
      - "5443:5432"
    volumes:
      - ../db-dev:/var/lib/postgresql/data
    restart: unless-stopped

  yt-dlp:
    build:
      context: .
      dockerfile: Dockerfile.yt-dlp
    container_name: maydls-yt-dlp
    volumes:
      - ../downloads:/downloads
    entrypoint: [ "tail", "-f", "/dev/null" ]
    restart: unless-stopped

      # NEW: React development container
  react:
    build:
      context: .
      dockerfile: Dockerfile.react
    container_name: maydls-react-dev
    ports:
      - "5173:5173"
    volumes:
      - ../maydls-web:/app
      - /app/node_modules  # Anonymous volume to keep node_modules inside container
      - /app/.pnpm-store  # Optional: persist pnpm store
    working_dir: /app
    # Auto-start the dev server
    command: sh -c "pnpm install && pnpm run dev"
    restart: unless-stopped
    # For Linux users - uncomment if needed:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"